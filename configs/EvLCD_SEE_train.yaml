JOBS: 24
TEST_ONLY: false
LOG_INTERVAL: 10
TRAIN_BATCH_SIZE: 2
VAL_BATCH_SIZE: 2
START_EPOCH: 0
END_EPOCH: 80
VAL_INTERVAL: 1
MODEL_SANING_INTERVAL: 1
MIX_PRECISION: false
RESUME:
  PATH: null
  TYPE: null
  SET_EPOCH: false
RESUME_STRICT: false
DUAL_VAL: false
LAUNCHER: ParallelLaunch
SEED: 9527
IS_CUDA: true
OPTIMIZER:
  NAME: Adam
  LR: 0.0001
  LR_SCHEDULER: cosine
  end_epoch: 80
LOSS:
  - NAME: l1_charbonnier_loss
    WEIGHT: 1
  - NAME: gradient_loss
    WEIGHT: 1
METRICS:
  - NAME: PSNR
  - NAME: PSNR-Linear_N
  - NAME: SSIM
DATASET:
  NAME: see_everything_everytime_dataset
  root: /path/to/SEE-600K/RoboticArm/
  in_frames: 1
  crop_h: 128
  crop_w: 256
  sample_step: 50
  event_representation_config:
    type: voxel_grid
    channel: 64
    scale: 5
    to_bin: false
  testing_mapping_type:
    - "high-normal"
    - "normal-normal"
    - "low-normal"
  training_mapping_type:
    - "high-normal"
    - "low-normal"
    - "normal-normal"
MODEL:
  NAME: EvLCD
  event_ch: 64
  base_ch: 48
  lcd_ch: 32
VISUALIZATION:
  folder: ./vis
  tag: EvLCD_SEE_train
  intermediate_visualization: false
  ONLY_VIS: false
